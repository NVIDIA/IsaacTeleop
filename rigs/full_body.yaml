#
# Run with: python -m isaacteleop.rig rigs/full_body.yaml
#
# No producers: the two consumer panes below are C++ readers pulling
# XR_BD_body_tracking joints directly from the OpenXR runtime — no producer
# plugin, no collection_id. The launcher always adds the CloudXR runtime pane
# (no `runtime:` override needed), so the session is three panes: runtime +
# the two consumers below. Requires a runtime with body tracking (e.g. CloudXR
# streaming from a PICO 4 Ultra Enterprise with Motion Trackers). A pane that
# started before the headset connected exits with 'Failed to get OpenXR
# system' — press Enter to rerun. The printer prints '[body tracking inactive]'
# once per second when the headset is connected but body tracking is
# unavailable (calibration / enterprise support). Each recorder run writes a
# fresh full_body_<timestamp>.mcap into the repo root (optional args:
# [duration_seconds, default 5 s] [output.mcap]); exiting after ~5 s is
# SUCCESS — replay headless with
# examples/mcap_record_replay/python/replay_full_body.py <file>.
# See rigs/se3_tracker.yaml for the fully annotated exemplar of every key.
name: full_body
description: CloudXR runtime + full-body joint printer + MCAP recorder (PICO 4 Ultra Enterprise with Motion Trackers)
cwd: ..                        # -> Teleop repo root
consumers:
  - name: full body printer (requires headset + motion trackers)
    command: "install/examples/schemaio/full_body_printer"
  - name: full body recorder (check printer pane first; Enter = new timestamped take)
    command: "install/examples/mcap_record_replay/cpp/record_full_body"
