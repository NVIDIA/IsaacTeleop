name: Build Windows (Experimental)

# WARNING: This workflow is for experimental Windows builds only!
# Windows support is NOT officially supported - this only tests source compilation.
# There is NO guarantee of runtime functionality on Windows.

on:
  push:
    branches: [ main ]
  pull_request:

# Per workflow+ref: max 1 running + 1 pending (new pending replaces old).
# PRs cancel in-progress runs; pushes to main do not.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-windows:
    # Pin to the VS 2022 image until newer MSVC toolchains are validated.
    runs-on: windows-2022

    env:
      SCCACHE_GHA_ENABLED: "true"
      # Keep compiler outputs built with newer MSVC toolchains out of VS 2022 jobs.
      SCCACHE_GHA_VERSION: "windows-vs2022-v1"

    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: ./.github/actions/setup-uv

    - name: Setup sccache
      uses: Mozilla-Actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

    # Hunter cache - caches depthai dependencies
    # Note: Hunter uses C:/.hunter on Windows (at drive root)
    # Include the toolset pin in the key because Hunter packages are compiler-built.
    - name: Cache Hunter packages
      uses: actions/cache@v5
      with:
        path: C:/.hunter
        key: hunter-${{ runner.os }}-vs2022-${{ hashFiles('cmake/SetupHunter.cmake') }}
        restore-keys: |
          hunter-${{ runner.os }}-vs2022-

    - name: Verify sccache
      run: |
        sccache --version

    # Put cl.exe and other build tools in PATH
    - name: Setup MSVC (Developer Command Prompt)
      uses: ilammy/msvc-dev-cmd@v1

    # Install LunarG Vulkan SDK (headers + loader lib). Sets VULKAN_SDK
    # env var so CMake's FindVulkan locates the install. The Vulkan
    # runtime/driver is not present on this CI runner, but Televiz [gpu]
    # tests skip cleanly via is_gpu_available() when no device is enumerated.
    - name: Install Vulkan SDK
      uses: humbletim/install-vulkan-sdk@v1.2
      with:
        version: 1.3.290.0
        cache: true

    # CUDA Toolkit needed at link time for viz_core (device_image links
    # cudart). Jimver action works correctly on Windows (the arm64
    # /x86_64/ hardcoding bug is Linux-only); runs NVIDIA's silent
    # network installer and sets CUDA_PATH so find_package(CUDAToolkit)
    # locates the install.
    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '12.4.0'
        method: 'network'
        sub-packages: '["nvcc", "cudart"]'

    - name: Configure CMake
      # Note:
      # sccache does not work with VSBuild, so we use Ninja generator here.
      # -G Ninja would pickup mingw64 by default on Windows, so we explicitly set the compiler to cl.exe
      # Force embedded debug info (Z7) to avoid PDB contention whenever debug info is generated.
      run: >
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DENABLE_EXPERIMENTAL_WINDOWS_BUILD=ON
        -DCMAKE_C_COMPILER_LAUNCHER=sccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        -DCMAKE_C_COMPILER="cl.exe"
        -DCMAKE_CXX_COMPILER="cl.exe"
        -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
        -DBUILD_PLUGIN_OAK_CAMERA=ON
        -DBUILD_VIZ=ON

    - name: Build
      shell: pwsh
      run: |
        $buildLog = Join-Path $env:RUNNER_TEMP "windows-build-${{ matrix.build_type }}.log"

        cmd /c "cmake --build build --parallel 2>&1" | Tee-Object -FilePath $buildLog
        $exitCode = $LASTEXITCODE

        if ($exitCode -ne 0) {
          $matches = Select-String `
            -Path $buildLog `
            -Pattern 'FAILED:|fatal error|error C\d+|error LNK\d+|ninja: build stopped|CMake Error' `
            -Context 2,2
          $lines = foreach ($match in ($matches | Select-Object -Last 8)) {
            $match.Context.PreContext
            $match.Line
            $match.Context.PostContext
          }
          if (-not $lines) {
            $lines = Get-Content $buildLog -Tail 80
          }
          $message = ($lines | Select-Object -Last 120) -join "`n"
          $message = $message -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A'
          Write-Host "::error title=Windows ${{ matrix.build_type }} build failed::$message"
          exit $exitCode
        }

    - name: Run All Tests
      shell: pwsh
      run: |
        $testLog = Join-Path $env:RUNNER_TEMP "windows-ctest-${{ matrix.build_type }}.log"

        $runtimePaths = @(
          (Join-Path $PWD "build\_deps\openxr-sdk-build\src\loader"),
          (Join-Path $PWD "build\_deps\openxr-sdk-build\src\loader\${{ matrix.build_type }}"),
          (Join-Path $env:VULKAN_SDK "Bin")
        ) | Where-Object { Test-Path $_ }
        if ($runtimePaths) {
          $env:PATH = (($runtimePaths + $env:PATH) -join [System.IO.Path]::PathSeparator)
        }

        cmd /c "ctest --test-dir build --output-on-failure --parallel 2>&1" | Tee-Object -FilePath $testLog
        $exitCode = $LASTEXITCODE

        if ($exitCode -ne 0) {
          $matches = Select-String `
            -Path $testLog `
            -Pattern 'Error|FAILED|Failed|failed|Could not|not found|The following tests FAILED|0% tests passed|No tests were found' `
            -Context 2,4
          $lines = foreach ($match in ($matches | Select-Object -Last 8)) {
            $match.Context.PreContext
            $match.Line
            $match.Context.PostContext
          }
          if (-not $lines) {
            $lines = Get-Content $testLog -Tail 120
          }
          $message = ($lines | Select-Object -Last 160) -join "`n"
          $message = $message -replace '%', '%25' -replace "`r", '%0D' -replace "`n", '%0A'
          Write-Host "::error title=Windows ${{ matrix.build_type }} tests failed::$message"
          exit $exitCode
        }
