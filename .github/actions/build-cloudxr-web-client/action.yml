#
# Reads CXR_WEB_SDK_VERSION from deps/cloudxr/.env.default, downloads the SDK
# from NGC (private if `ngc-api-key` is provided, public otherwise), then runs
# the web client build, unit tests, and browser smoke tests in an isolated
# container. Output is written to
# deps/cloudxr/webxr_client/build/.

name: Build CloudXR Web Client
description: Download the CloudXR Web SDK from NGC and build the web client.

inputs:
  ngc-api-key:
    description: NGC API key for the private SDK; leave empty to use the public SDK.
    required: false
    default: ''
  playwright-image:
    description: Container image used for the web client build and Playwright smoke test.
    required: false
    default: 'mcr.microsoft.com/playwright:v1.61.1-noble'

outputs:
  sdk-version:
    description: CloudXR Web SDK version that was downloaded.
    value: ${{ steps.sdk-version.outputs.version }}

runs:
  using: composite
  steps:
    - id: sdk-version
      shell: bash
      run: |
        version=$(grep -E '^CXR_WEB_SDK_VERSION=.+' deps/cloudxr/.env.default | cut -d= -f2)
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    # download_cloudxr_sdk.sh tries local tarball, public NGC, then private NGC
    # (the latter requires NGC_API_KEY). Only the tarball is needed here; the
    # script's full bundle layout check is irrelevant for this action.
    - name: Download CloudXR Web SDK from NGC
      shell: bash
      env:
        CXR_WEB_SDK_VERSION: ${{ steps.sdk-version.outputs.version }}
        NGC_API_KEY: ${{ inputs.ngc-api-key }}
      run: |
        ./scripts/download_cloudxr_sdk.sh

    - name: Build and smoke-test web client in isolated container
      shell: bash
      env:
        SDK_VERSION: ${{ steps.sdk-version.outputs.version }}
        CLIENT_GIT_REF: ${{ github.ref_name }}
        CLIENT_GIT_SHA: ${{ github.sha }}
        PLAYWRIGHT_IMAGE: ${{ inputs.playwright-image }}
      run: bash ./scripts/run_webxr_smoke_in_container.sh
