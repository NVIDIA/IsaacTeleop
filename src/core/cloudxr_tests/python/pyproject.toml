[project]
name = "isaacteleop-cloudxr-tests"
version = "0.0.0"
description = "Unit tests for Isaac Teleop CloudXR teleop control hub"
requires-python = ">=3.10,<3.13"

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio>=1.3.0",
]
test = [
    "pytest",
    "pytest-asyncio>=1.3.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
norecursedirs = [".git", ".venv", "build", "dist", "*.egg", "__pycache__"]
