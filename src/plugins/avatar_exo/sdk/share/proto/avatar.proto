syntax = "proto3";
// Public minimal subset for SDK data plane. Definitions match sharpa.proto for wire compatibility.

package proto;

// ==================== Common Messages ====================
message Stamp {
    int32 sec = 1;
    int32 nanosec = 2;
}
message Header {
    Stamp stamp = 1;
    string key = 2;
    string frame_id = 3;
    Stamp sys_time = 4;
    uint32 seq = 5;
}
// ================= State/Action Messages ==================
message Joint {
    repeated string name = 1;
    repeated float position = 2;
    repeated float velocity = 3;
    repeated float effort = 4;
}
message Point {
    float x = 1;
    float y = 2;
    float z = 3;
}
message Quaternion {
    float w = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}
message Vector3 {
    float x = 1;
    float y = 2;
    float z = 3;
}
message Pose {
    Point position = 1;
    Quaternion orientation = 2;
}
message Hand {
    Header header = 1;
    Joint joint = 2;
}
message HandSkeleton {
    Header header = 1;
    repeated Pose landmark = 2;
}
message AvatarDataFrame {
    oneof payload {
        Hand raw = 1;
        Hand robot = 2;
        HandSkeleton skeleton = 3;
    }
}
