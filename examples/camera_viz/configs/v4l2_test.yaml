#
# V4L2 source test config — toggle ``mode`` between ``window`` and ``xr``
# without touching anything else. Both window/xr blocks are populated so
# the swap is one-line.
#
# Defaults match the ZED Mini's UVC HD720 side-by-side mode at
# /dev/video0 (2560x720 YUYV @ 30fps; cv2 negotiates YUYV→BGR on CPU,
# GPU then channel-swaps BGR→RGBA). Swap to a regular UVC webcam by
# updating device/width/height/fps to whatever ``v4l2-ctl
# --list-formats-ext`` reports for your /dev/videoN.

mode: window     # window | xr
window:
  width: 2560
  height: 720
xr:
  near_z: 0.05
  far_z: 100.0
clear_color: [0.05, 0.05, 0.08, 1.0]

sources:
  - name: cam
    type: v4l2
    device: /dev/video0
    width: 2560
    height: 720
    fps: 30
    # fourcc: MJPG    # only if the device offers MJPG (ZED V4L2 is YUYV-only)
    placement:        # used only in xr mode; harmless in window
      lock_mode: lazy
      size: [1.6, 0.45]   # 3.55:1 aspect to match the SBS pair
      distance: 1.5
