#
# ZED stereo (ZED 2 / ZED Mini / ZED X Mini) into an XR headset. Native
# GPU-resident path — pyzed's retrieve_image(MEM.GPU) hands back BGRA8
# directly in VRAM, so the only copy on the hot path is a single GPU
# channel-swap into our contiguous RGBA buffer. Zero H2D, zero D2H.
#
# Resolution preset names match pyzed.sl.RESOLUTION exactly:
#   HD2K   2208x1242 @ 15fps
#   HD1080 1920x1080 @ 30fps
#   HD720  1280x720  @ 30/60fps
#   VGA    672x376   @ 100fps

mode: xr
xr:
  near_z: 0.05
  far_z: 100.0
clear_color: [0.0, 0.0, 0.0, 1.0]

sources:
  - base_name: zed
    type: zed
    resolution: HD720
    fps: 60
    bus_type: usb
    serial_number: 0     # 0 → first available
    stereo: true
    placements:
      left:
        lock_mode: lazy
        size: [0.5, 0.28125]   # 16:9 at 0.5 m wide
        distance: 1.0
        offset_x: -0.30
      right:
        lock_mode: lazy
        size: [0.5, 0.28125]
        distance: 1.0
        offset_x: 0.30
