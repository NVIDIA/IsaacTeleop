#
# V4L2 source — same YAML drives both camera_viz (receiver) and
# camera_sender (RTP sender). Flip top-level ``source: local|rtp`` to
# control what camera_viz opens; camera_sender always reads cameras +
# rtp ports + streaming.host.
#
# Defaults match the ZED Mini's UVC HD720 side-by-side mode at
# /dev/video0 (2560x720 YUYV @ 30fps; cv2 negotiates YUYV→BGR on CPU,
# GPU then channel-swaps BGR→RGBA). For a regular UVC webcam, edit
# device/width/height/fps per ``v4l2-ctl --list-formats-ext``.

source: local                   # local | rtp
streaming:
  host: 127.0.0.1               # camera_sender target (override with --host)

cameras:
  - name: cam
    enabled: true
    type: v4l2
    device: /dev/video0
    width: 2560
    height: 720
    fps: 30
    # fourcc: MJPG              # only if the device offers MJPG (ZED V4L2 is YUYV-only)
    rtp:                        # used by camera_sender + source: rtp receivers
      port: 5000
      bitrate: 6000000          # ~6 Mbps for 2560x720@30
      profile: baseline
      gop: 15                   # IDR every ~0.5s; faster recovery on packet loss
      color_range: limited      # YUV→BGR→NV12 chain ends up BT.601 full-ish; bump to 'full' if colors look washed

display:
  mode: window                  # window | xr
  window:
    width: 2560
    height: 720
  xr:
    near_z: 0.05
    far_z: 100.0
  clear_color: [0.05, 0.05, 0.08, 1.0]
  placements:
    cam:
      lock_mode: lazy
      size: [1.6, 0.45]         # 3.55:1 aspect for the SBS pair
      distance: 1.5
