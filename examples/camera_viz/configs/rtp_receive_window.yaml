#
# Receive a single H.264 RTP stream over UDP, decode via NVDEC, display
# in a desktop window. Sender side runs on the robot (camera → NVENC
# → RTP); see configs/rtp_send_v4l2.yaml + camera_send.py for the
# matching sender.
#
# color_range:
#   limited  — H.264 default (BT.709 limited, 16-235 luma)
#   full     — set to 'full' for OAK-D on-device VPU streams (BT.601 full)
#
# port + buffer_size + low-latency knobs all live in the source spec
# itself rather than YAML-global so multi-receiver configs can mix
# different stream parameters.

mode: window
window:
  width: 1280
  height: 720
clear_color: [0.05, 0.05, 0.08, 1.0]

sources:
  - name: rtp_in
    type: rtp_h264
    port: 5000
    width: 1280
    height: 720
    color_range: limited
