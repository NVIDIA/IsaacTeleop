#
# ZED source test config (mono / left eye only) — toggle ``mode``
# between ``window`` and ``xr`` without touching anything else.
#
# ``stereo: false`` for now — real stereo XR rendering needs per-eye
# buffer binding in QuadLayer (one stream → one eye), not two
# independent planes. Re-add stereo: true once that lands. See
# memory note "Stereo XR rendering needs per-view QuadLayer buffers".
#
# Mono mode produces a single ``left`` source under the base_name.

mode: window     # window | xr
window:
  width: 1280
  height: 720
xr:
  near_z: 0.05
  far_z: 100.0
clear_color: [0.0, 0.0, 0.0, 1.0]

sources:
  - base_name: zed
    type: zed
    resolution: HD720
    fps: 30
    bus_type: usb
    serial_number: 0     # 0 → first available
    stereo: false
    placements:          # keyed by eye; only ``left`` for mono
      left:
        lock_mode: lazy
        size: [1.0, 0.5625]   # 16:9 at 1m wide
        distance: 1.5
