#
# OAK-D source test config (mono RGB) — toggle ``mode`` between
# ``window`` and ``xr`` without touching anything else.
#
# Mono-only by design: real stereo XR rendering needs per-eye buffer
# binding in QuadLayer, not two independent planes both visible to
# both eyes. Re-add a stereo config once that lands. See memory note
# "Stereo XR rendering needs per-view QuadLayer buffers".

mode: window     # window | xr
window:
  width: 1280
  height: 720
xr:
  near_z: 0.05
  far_z: 100.0
clear_color: [0.0, 0.0, 0.0, 1.0]

sources:
  - base_name: oakd
    type: oakd
    mode: mono
    device_id: ""        # first available
    camera_socket: RGB
    width: 1280
    height: 720
    fps: 30
    placements:          # keyed by stream name; only ``mono`` here
      mono:
        lock_mode: lazy
        size: [1.0, 0.5625]   # 16:9 at 1m wide
        distance: 1.5
