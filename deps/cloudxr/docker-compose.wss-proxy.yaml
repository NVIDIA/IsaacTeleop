# CloudXR compose override for the WebSocket SSL proxy service.
# Used together with docker-compose.runtime.yaml.

services:
  # WebSocket SSL Proxy Service
  wss-proxy:
    build:
      context: .
      dockerfile: Dockerfile.wss-proxy
    container_name: cloudxr-wss-proxy-${CXR_WEB_SDK_VERSION}
    network_mode: host
    depends_on:
      cloudxr-runtime:
        condition: service_healthy
    environment:
      # Backend configuration (cloudxr-runtime WebRTC port)
      - BACKEND_HOST=localhost
      - BACKEND_PORT=49100
      # Proxy SSL port
      - PROXY_PORT=48322
      # Health check configuration
      - HEALTH_CHECK_INTERVAL=1s
      - HEALTH_CHECK_RISE=2
      - HEALTH_CHECK_FALL=3
    restart: unless-stopped
